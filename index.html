<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coração Pulsante JS</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        // Ajusta o tamanho do canvas
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Classe auxiliar para cálculos de posição (Vetores)
        class Vector {
            constructor(x, y) { this.x = x; this.y = y; }
            add(v) { return new Vector(this.x + v.x, this.y + v.y); }
            subtract(v) { return new Vector(this.x - v.x, this.y - v.y); }
            scale(s) { return new Vector(this.x * s, this.y * s); }
        }

        let origin = new Vector(canvas.width / 2, canvas.height / 2);
        let mouse = new Vector(origin.x, origin.y);

        window.addEventListener('mousemove', (e) => {
            mouse = new Vector(e.clientX, e.clientY);
        });

        // --- CÓDIGO DA IMAGEM ADAPTADO ---
        const polar = (rad, time) => {
            // A pulsação acontece aqui
            let pulse = Math.sin(time / 100); 
            rad += pulse;

            // Equação matemática do formato do coração
            let x = 16 * Math.pow(Math.sin(rad), 3);
            let y = -(13 * Math.cos(rad) - 5 * Math.cos(2 * rad) - 2 * Math.cos(3 * rad) - Math.cos(4 * rad));

            // Escala (tamanho)
            let scale = (Math.sin(time / 10) + 3) * 10;

            // Retorna a posição final baseada no centro e no mouse
            return new Vector(x * scale, y * scale).add(
                origin.add(mouse.subtract(origin).scale(0.5))
            );
        };

        let time = 0;

        function animate() {
            // Cria o efeito de "rastro" (motion blur)
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Desenha o coração usando 100 pontos por frame
            ctx.fillStyle = "#ff0044";
            for (let i = 0; i < 100; i++) {
                let pos = polar(Math.random() * Math.PI * 2, time);
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, 1.5, 0, Math.PI * 2);
                ctx.fill();
            }

            time++;
            requestAnimationFrame(animate);
        }

        animate();

        // Reajusta se a janela mudar de tamanho
        window.onresize = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            origin = new Vector(canvas.width / 2, canvas.height / 2);
        };
    </script>
</body>
</html>
