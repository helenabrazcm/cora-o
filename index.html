<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Coração Neon</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        class Vector {
            constructor(x, y) { this.x = x; this.y = y; }
            add(v) { return new Vector(this.x + v.x, this.y + v.y); }
            subtract(v) { return new Vector(this.x - v.x, this.y - v.y); }
            scale(s) { return new Vector(this.x * s, this.y * s); }
        }

        let origin = new Vector(canvas.width / 2, canvas.height / 2);
        let mouse = new Vector(origin.x, origin.y);

        window.addEventListener('mousemove', (e) => {
            mouse = new Vector(e.clientX, e.clientY);
        });

        const polar = (rad, time) => {
            let pulse = Math.sin(time / 100); 
            rad += pulse;

            // Equação do coração
            let x = 16 * Math.pow(Math.sin(rad), 3);
            let y = -(13 * Math.cos(rad) - 5 * Math.cos(2 * rad) - 2 * Math.cos(3 * rad) - Math.cos(4 * rad));

            // REDUZIDO: Ajustei o multiplicador final para 7 (antes era 10) para diminuir o tamanho
            let scale = (Math.sin(time / 10) + 3) * 7;

            return new Vector(x * scale, y * scale).add(
                origin.add(mouse.subtract(origin).scale(0.5))
            );
        };

        let time = 0;

        function animate() {
            // Fundo com rastro leve
            ctx.fillStyle = "rgba(0, 0, 0, 0.15)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // CONFIGURAÇÃO NEON
            ctx.fillStyle = "#ff0055";
            ctx.shadowBlur = 15; // Intensidade do brilho
            ctx.shadowColor = "#ff0055"; // Cor do brilho

            // Aumentei para 150 pontos para ficar mais visível
            for (let i = 0; i < 150; i++) {
                let pos = polar(Math.random() * Math.PI * 2, time);
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, 1.2, 0, Math.PI * 2);
                ctx.fill();
            }

            // Reset do shadow para não pesar o processamento do resto
            ctx.shadowBlur = 0;

            time++;
            requestAnimationFrame(animate);
        }

        animate();

        window.onresize = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            origin = new Vector(canvas.width / 2, canvas.height / 2);
        };
    </script>
</body>
</html>
